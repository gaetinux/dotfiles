# ─────────────────────────────────────────────────────────────────
#  ~/.tmux.conf  —  sans plugins, 100 % natif
# ─────────────────────────────────────────────────────────────────

# ── True color (ESSENTIEL pour le rendu de LazyVim) ──────────────
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# ── Confort de base ──────────────────────────────────────────────
set -g  mouse on
set -g  history-limit 50000
set -g  base-index 1               # fenêtres numérotées à partir de 1
setw -g pane-base-index 1
set -sg escape-time 10             # évite le lag sur la touche Échap dans nvim
set -g  focus-events on            # autoread / refresh statusline dans nvim
set -g  renumber-windows on        # renumérote quand tu fermes une fenêtre
set -g  display-time 2000          # messages tmux affichés 2 s
set -g  status-interval 5          # rafraîchit la status bar toutes les 5 s
setw -g aggressive-resize on       # redimensionne mieux en multi-clients

# ── Presse-papier via OSC 52 (copie distante -> presse-papier LOCAL) ──
set -g  set-clipboard on                      # tmux pousse les copies au terminal
set -ga terminal-features ',*:clipboard'      # annonce OSC52 si terminal non auto-détecté
setw -g mode-keys vi                          # navigation type vi en copy-mode
# y copie la sélection (et la met dans le presse-papier local via OSC52)
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
# glisser-souris : copie aussi au relâchement
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# ── Quelques raccourcis pratiques (vire si tu veux) ──────────────
# Recharger la conf à chaud : prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display "Config rechargée ✓"
# Splits avec | et - (plus intuitif que % et ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
