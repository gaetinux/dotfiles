# ─────────────────────────────────────────────────────────────────
#  ~/.tmux.conf
# ─────────────────────────────────────────────────────────────────

# ── True color (ESSENTIEL pour le rendu de LazyVim) ──────────────
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# ── Confort de base ──────────────────────────────────────────────
set -g  mouse on
set -g  history-limit 50000
set -g  base-index 1               # fenêtres numérotées à partir de 1
setw -g pane-base-index 1
set -sg escape-time 10             # évite le lag sur la touche Échap dans nvim
set -g  focus-events on            # autoread / refresh statusline dans nvim
set -g  renumber-windows on        # renumérote quand tu fermes une fenêtre

# ── Quelques raccourcis pratiques (optionnel, vire si tu veux) ───
# Recharger la conf à chaud : prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display "Config rechargée ✓"
# Splits avec | et - (plus intuitif que % et ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Plugins (TPM) ────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'    # défauts sains
set -g @plugin 'tmux-plugins/tmux-resurrect'   # sauvegarde/restaure les sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # sauvegarde auto + restore au boot

# Restaure automatiquement la dernière session au démarrage de tmux
set -g @continuum-restore 'on'

# ── Init TPM (DOIT rester la toute dernière ligne) ───────────────
run '~/.tmux/plugins/tpm/tpm'
